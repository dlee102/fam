<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>뉴스 이벤트 10분봉 수익률 경로</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+KR:wght@300;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#090b12;--panel:#0f1220;--border:#1a2035;--text:#dde3f4;--muted:#4a5878;
  --gold:#e8a820;--teal:#1fd4bf;--red:#f04060;--blue:#3a8ff0;--purple:#9d7ef0;--green:#25c985;}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;padding:20px 24px;min-height:100vh}
h1{font-family:'Space Mono',monospace;font-size:0.95rem;letter-spacing:.1em;color:var(--gold);text-transform:uppercase}
.sub{font-size:.68rem;color:var(--muted);margin-bottom:18px;margin-top:3px}
.kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:18px}
.kpi{background:var(--panel);border:1px solid var(--border);border-radius:7px;padding:10px 14px}
.kpi-label{font-size:.62rem;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:2px}
.kpi-val{font-family:'Space Mono',monospace;font-size:1.05rem;font-weight:700}
.pos{color:var(--teal)} .neg{color:var(--red)} .neu{color:var(--gold)}
.ctrl{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
.tag{font-size:.62rem;color:var(--muted);font-family:'Space Mono',monospace;letter-spacing:.04em}
.btn{background:var(--panel);border:1px solid var(--border);color:var(--muted);padding:5px 12px;
  border-radius:5px;cursor:pointer;font-size:.7rem;font-family:'Space Mono',monospace;transition:all .15s}
.btn.active{border-color:var(--gold);color:var(--gold)}.btn:hover:not(.active){border-color:var(--blue);color:var(--blue)}
.stoggle{display:flex;align-items:center;gap:5px;font-size:.68rem;cursor:pointer;
  background:var(--panel);border:1px solid var(--border);padding:4px 10px;border-radius:5px;transition:all .15s}
.stoggle:hover{border-color:var(--blue)}
.stoggle input{width:12px;height:12px}
.chart-box{background:var(--panel);border:1px solid var(--border);border-radius:9px;padding:14px 16px;margin-bottom:14px}
canvas{max-height:380px!important}
.insights{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:14px}
.ins{background:var(--panel);border:1px solid var(--border);border-radius:7px;padding:10px 12px}
.ins-title{font-size:.62rem;color:var(--muted);font-family:'Space Mono',monospace;margin-bottom:6px;text-transform:uppercase}
.ins-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px}
.ins-name{font-size:.63rem;color:var(--muted)}
.ins-val{font-size:.72rem;font-family:'Space Mono',monospace;font-weight:700}
.note{font-size:.63rem;color:var(--muted);margin-top:10px}
</style>
</head>
<body>
<h1>NEWS EVENT · 10MIN BAR RETURN PATH</h1>
<p class="sub">뉴스 최초 기사일 t0 이벤트 당일 시가(KST 09:00) = 0% 기준 · 10분봉 × 10 거래일</p>

<div class="kpis">
  <div class="kpi"><div class="kpi-label">분석 종목</div><div class="kpi-val neu" id="k-n">—</div></div>
  <div class="kpi"><div class="kpi-label">D0 장마감 전체</div><div class="kpi-val" id="k-all-d0">—</div></div>
  <div class="kpi"><div class="kpi-label">D0 장마감 거래량2x↑</div><div class="kpi-val" id="k-v2-d0">—</div></div>
  <div class="kpi"><div class="kpi-label">D5 전체 평균</div><div class="kpi-val" id="k-all-d5">—</div></div>
  <div class="kpi"><div class="kpi-label">D5 거래량5x↑ 평균</div><div class="kpi-val pos" id="k-v5-d5">—</div></div>
  <div class="kpi"><div class="kpi-label">D10 거래량5x↑ 평균</div><div class="kpi-val pos" id="k-v5-d10">—</div></div>
</div>

<div class="ctrl">
  <span class="tag">지표:</span>
  <div style="display:flex;gap:4px">
    <button class="btn active" onclick="setMetric('mean',this)">평균</button>
    <button class="btn" onclick="setMetric('median',this)">중앙값</button>
    <button class="btn" onclick="setMetric('win_rate',this)">승률</button>
  </div>
  <span class="tag" style="margin-left:8px">그룹:</span>
  <label class="stoggle"><input type="checkbox" checked onchange="toggleSeries('all',this)"><span style="color:#3a8ff0">전체</span></label>
  <label class="stoggle"><input type="checkbox" checked onchange="toggleSeries('vol_ge_2x',this)"><span style="color:#1fd4bf">거래량 2x↑</span></label>
  <label class="stoggle"><input type="checkbox" checked onchange="toggleSeries('vol_ge_5x',this)"><span style="color:#e8a820">거래량 5x↑</span></label>
  <label class="stoggle"><input type="checkbox" checked onchange="toggleSeries('event_pos',this)"><span style="color:#25c985">당일 상승</span></label>
  <label class="stoggle"><input type="checkbox" checked onchange="toggleSeries('event_nonpos',this)"><span style="color:#f04060">당일 비상승</span></label>
</div>

<div class="chart-box"><canvas id="mc"></canvas></div>

<div class="insights" id="ins"></div>

<p class="note">* UTC 기준 5분봉 → 10분봉 합산. 이벤트 당일 오전 9시 시가 = 0%. 한 거래일당 39봉(샘플링 기준). 데이터 부족 구간은 마지막 값 연장.</p>

const COLORS={all:'#3a8ff0',vol_ge_2x:'#1fd4bf',vol_ge_5x:'#e8a820',event_pos:'#25c985',event_nonpos:'#f04060'};
const NAMES={all:'전체',vol_ge_2x:'거래량 2x↑',vol_ge_5x:'거래량 5x↑',event_pos:'당일 상승',event_nonpos:'당일 비상승'};
const vis={all:true,vol_ge_2x:true,vol_ge_5x:true,event_pos:true,event_nonpos:true};
let metric='mean', D, bpd, ctx, chart;

function fmt(v,m){
  if(!isFinite(v)) return '—';
  if(m==='win_rate') return (v*100).toFixed(1)+'%';
  return (v*100>=0?'+':'')+(v*100).toFixed(2)+'%';
}

const bgPlugin={id:'bg',beforeDraw(ch){
  const {ctx,chartArea:{left,right,top,bottom},scales:{x}}=ch;
  ctx.save();
  for(let d=0;d<10;d++){
    const x1=x.getPixelForValue(d*bpd);
    const x2=x.getPixelForValue((d+1)*bpd-1);
    ctx.fillStyle=d%2===0?'rgba(255,255,255,0.018)':'transparent';
    ctx.fillRect(x1,top,x2-x1,bottom-top);
    // day label
    ctx.fillStyle='rgba(74,88,120,0.9)';
    ctx.font='bold 9px Space Mono, monospace';
    ctx.fillText('D'+d, x1+4, top+12);
  }
  ctx.restore();
}};

const zeroPlugin={id:'zero',afterDraw(ch){
  const {ctx,chartArea:{left,right},scales:{y}}=ch;
  if(!y) return;
  const y0=y.getPixelForValue(0);
  ctx.save();ctx.strokeStyle='rgba(255,255,255,0.12)';ctx.lineWidth=1;ctx.setLineDash([4,4]);
  ctx.beginPath();ctx.moveTo(left,y0);ctx.lineTo(right,y0);ctx.stroke();ctx.restore();
}};

function makeLabels(){
  const L=[];
  for(let i=0;i<D.total_bars;i++) L.push(i);
  return L;
}

function buildDS(){
  return Object.keys(COLORS).map(k=>{
    const sg=D[k];
    if(!sg) return null;
    const arr=sg[metric]||sg.mean;
    return {label:NAMES[k],data:arr,borderColor:COLORS[k],backgroundColor:'transparent',
      borderWidth:k==='all'?2:1.5,pointRadius:0,tension:0.25,hidden:!vis[k]};
  }).filter(Boolean);
}

function initChart(){
  ctx=document.getElementById('mc').getContext('2d');
  chart=new Chart(ctx,{
    type:'line',
    data:{labels:makeLabels(),datasets:buildDS()},
    plugins:[bgPlugin,zeroPlugin],
    options:{
      animation:{duration:300},responsive:true,
      interaction:{mode:'index',intersect:false},
      scales:{
        x:{grid:{color:'rgba(255,255,255,0.03)'},
          ticks:{color:'#4a5878',font:{size:0},maxTicksLimit:0}},
        y:{grid:{color:'rgba(255,255,255,0.05)'},
          ticks:{color:'#4a5878',font:{size:9,family:'Space Mono'},
            callback:v=>metric==='win_rate'?(v*100).toFixed(0)+'%':(v*100>=0?'+':'')+(v*100).toFixed(1)+'%'}}
      },
      plugins:{
        legend:{display:false},
        tooltip:{
          backgroundColor:'rgba(15,18,32,0.97)',borderColor:'#1a2035',borderWidth:1,
          titleFont:{family:'Space Mono',size:9},bodyFont:{family:'Noto Sans KR',size:11},
          callbacks:{
            title(items){
              const i=items[0].dataIndex;
              const day=Math.floor(i/bpd);
              const bar=i%bpd;
              const minOff=bar*20; // every 2 bars sampled → 20min per step? no, bpd=39, 39 bars per day
              const actualMin=bar*10;
              const h=9+Math.floor(actualMin/60),m=actualMin%60;
              return `D${day} KST ${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
            },
            label:item=>` ${item.dataset.label}: ${fmt(item.raw,metric)}`
          }
        }
      }
    }
  });
}

function updateKPIs(){
  const b=bpd;
  const idx=n=>Math.min(n,D.all.mean.length-1);
  function v(k,i){return(D[k]&&(D[k][metric]||D[k].mean)||[])[idx(i)];}
  document.getElementById('k-n').textContent=D.n_tickers+'개';
  const a0=v('all',b-1); document.getElementById('k-all-d0').textContent=fmt(a0,metric);
  document.getElementById('k-all-d0').className='kpi-val '+(a0>=0?'pos':'neg');
  const v20=v('vol_ge_2x',b-1); document.getElementById('k-v2-d0').textContent=fmt(v20,metric);
  document.getElementById('k-v2-d0').className='kpi-val '+(v20>=0?'pos':'neg');
  const a5=v('all',b*5-1); document.getElementById('k-all-d5').textContent=fmt(a5,metric);
  document.getElementById('k-all-d5').className='kpi-val '+(a5>=0?'pos':'neg');
  const v55=v('vol_ge_5x',b*5-1); document.getElementById('k-v5-d5').textContent=fmt(v55,metric);
  const v510=v('vol_ge_5x',b*10-1); document.getElementById('k-v5-d10').textContent=fmt(v510,metric);
}

function updateIns(){
  const b=bpd;
  const pts=[{l:'D0 종가',i:b-1},{l:'D1 종가',i:b*2-1},{l:'D3 종가',i:b*4-1},{l:'D5 종가',i:b*6-1},{l:'D10 종가',i:b*10-1}];
  document.getElementById('ins').innerHTML=pts.map(p=>{
    const rows=Object.keys(COLORS).map(k=>{
      const sg=D[k]; if(!sg) return '';
      const arr=sg[metric]||sg.mean;
      const v=arr[Math.min(p.i,arr.length-1)];
      const cls=metric==='win_rate'?(v>=0.5?'pos':'neg'):(v>=0?'pos':'neg');
      return `<div class="ins-row"><span class="ins-name" style="color:${COLORS[k]}">${NAMES[k]}</span><span class="ins-val ${cls}">${fmt(v,metric)}</span></div>`;
    }).join('');
    return `<div class="ins"><div class="ins-title">${p.l}</div>${rows}</div>`;
  }).join('');
}

function setMetric(m,btn){
  metric=m;
  document.querySelectorAll('.btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  chart.data.datasets=buildDS();
  chart.options.scales.y.ticks.callback=v=>m==='win_rate'?(v*100).toFixed(0)+'%':(v*100>=0?'+':'')+(v*100).toFixed(1)+'%';
  chart.update();updateKPIs();updateIns();
}

function toggleSeries(k,cb){
  vis[k]=cb.checked;
  const ds=chart.data.datasets.find(d=>d.label===NAMES[k]);
  if(ds){ds.hidden=!cb.checked;chart.update();}
}

D=D_INLINE; bpd=D.bpd; initChart(); updateKPIs(); updateIns();
</script>
